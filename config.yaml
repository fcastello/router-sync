# Router Sync Configuration (defaults; production uses Ansible-managed file)

log_level: warn

nats:
  urls:
    - "nats://127.0.0.1:4222"
  username: ""
  password: ""
  token: ""
  cluster_id: "router-sync-cluster"
  client_id: "router-sync-client"
  writer_id: "local"

api:
  address: ":18080"

sync:
  interval: 30s
